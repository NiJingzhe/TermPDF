name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build macOS arm64 binary
        run: cargo build --release --target aarch64-apple-darwin
        env:
          TERMPDF_PDFIUM_VARIANT: macos-arm64
      - name: Package macOS arm64 artifact
        run: |
          chmod +x scripts/package_release.sh
          TERMPDF_RELEASE_VERSION="${GITHUB_REF_NAME#v}" scripts/package_release.sh \
            aarch64-apple-darwin \
            macos-arm64 \
            target/aarch64-apple-darwin/release/termpdf \
            dist
      - name: Upload macOS arm64 artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            pdfium_variant: linux-x64-glibc
            docker_platform: linux/amd64
          - target: i686-unknown-linux-gnu
            pdfium_variant: linux-x86-glibc
            docker_platform: linux/386
          - target: armv7-unknown-linux-gnueabihf
            pdfium_variant: linux-arm-glibc
            docker_platform: linux/arm/v7
          - target: aarch64-unknown-linux-gnu
            pdfium_variant: linux-arm64-glibc
            docker_platform: linux/arm64
          - target: powerpc64le-unknown-linux-gnu
            pdfium_variant: linux-ppc64-glibc
            docker_platform: linux/ppc64le
    steps:
      - uses: actions/checkout@v4
      - name: Enable QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build Linux artifact in target container
        run: |
          docker run --rm \
            --platform "${{ matrix.docker_platform }}" \
            -e CARGO_HOME=/cargo \
            -e RUSTUP_HOME=/cargo/rustup \
            -e TERMPDF_PDFIUM_VARIANT="${{ matrix.pdfium_variant }}" \
            -e TARGET_TRIPLE="${{ matrix.target }}" \
            -v "$PWD":/workspace \
            -v cargo-registry:/cargo/registry \
            -v cargo-rustup:/cargo/rustup \
            -v cargo-git:/cargo/git \
            -w /workspace \
            rust:1.89-bookworm \
            bash -lc 'apt-get update && apt-get install -y curl ca-certificates build-essential pkg-config libssl-dev && curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal && . /cargo/env && rustup target add "$TARGET_TRIPLE" && cargo build --release --target "$TARGET_TRIPLE"'
      - name: Package Linux artifact
        run: |
          chmod +x scripts/package_release.sh
          TERMPDF_RELEASE_VERSION="${GITHUB_REF_NAME#v}" scripts/package_release.sh \
            "${{ matrix.target }}" \
            "${{ matrix.pdfium_variant }}" \
            "target/${{ matrix.target }}/release/termpdf" \
            dist
      - name: Upload Linux artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
